<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
    <div id="login-section" class="flex h-screen items-center justify-center">
        <div class="bg-white p-8 rounded-lg shadow-md w-96 text-center border border-gray-200">
            <h2 class="text-2xl font-bold mb-4">Admin Login</h2>
            <input type="password" id="pin-input" placeholder="Enter Secure Passphrase" class="w-full p-3 border rounded mb-4 text-center text-xl">
            <button onclick="login()" class="w-full bg-blue-600 text-white font-bold py-3 rounded hover:bg-blue-700 transition">Login</button>
        </div>
    </div>

    <div id="dashboard-section" class="hidden min-h-screen flex flex-col">
        <header class="bg-blue-600 text-white p-4 flex justify-between items-center shadow-md">
            <h1 class="text-xl font-bold">Admin Dashboard</h1>
            <div class="flex gap-4">
                <button onclick="exportToWeb()" class="bg-purple-600 px-4 py-2 rounded hover:bg-purple-700 text-sm font-medium text-white transition shadow">Sync to Web (Manual)</button>
                <button onclick="resetDefaults()" class="bg-yellow-500 px-4 py-2 rounded hover:bg-yellow-600 text-sm font-medium text-white transition">Reset Data</button>
                <a href="index.html" class="bg-blue-700 px-4 py-2 rounded hover:bg-blue-800 text-sm font-medium transition">Kembali ke Web</a>
                <button onclick="logout()" class="bg-red-600 px-4 py-2 rounded hover:bg-red-700 text-sm font-medium transition">Logout</button>
            </div>
        </header>
        <div class="flex flex-1">
            <aside class="w-64 bg-white shadow-md">
                <nav class="flex flex-col p-4 gap-2">
                    <button onclick="switchTab('projects')" class="text-left p-3 rounded hover:bg-blue-50 hover:text-blue-600 font-medium transition">Manage Projects</button>
                    <button onclick="switchTab('certificates')" class="text-left p-3 rounded hover:bg-blue-50 hover:text-blue-600 font-medium transition">Manage Certificates</button>
                </nav>
            </aside>
            <main class="flex-1 p-8 bg-gray-50 overflow-y-auto relative">
                
                <!-- Alert Box for Syncing -->
                <div id="sync-alert" class="hidden absolute top-4 left-1/2 transform -translate-x-1/2 bg-green-100 border border-green-400 text-green-700 px-6 py-3 rounded shadow-lg z-50 transition-all">
                    <span class="block sm:inline font-medium">✅ Data JSON berhasil di-copy ke Clipboard! Silakan paste di data.txt VS Code.</span>
                </div>

                <h2 id="page-title" class="text-2xl font-bold mb-6">Welcome</h2>
                
                <div id="view-projects" class="hidden">
                    <button onclick="openModal('project')" class="bg-green-600 text-white px-4 py-2 rounded mb-4 hover:bg-green-700 font-medium">+ Add New Project</button>
                    <div class="bg-white rounded-lg shadow border border-gray-100 overflow-hidden">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-gray-100">
                                <tr class="border-b">
                                    <th class="p-3">Title</th>
                                    <th class="p-3">Category</th>
                                    <th class="p-3">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="projects-table-body" class="divide-y divide-gray-100"></tbody>
                        </table>
                    </div>
                </div>

                <div id="view-certificates" class="hidden">
                    <button onclick="openModal('certificate')" class="bg-green-600 text-white px-4 py-2 rounded mb-4 hover:bg-green-700 font-medium">+ Add New Certificate</button>
                    <div class="bg-white rounded-lg shadow border border-gray-100 overflow-hidden">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-gray-100">
                                <tr class="border-b">
                                    <th class="p-3">Title</th>
                                    <th class="p-3">Badge</th>
                                    <th class="p-3">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="certificates-table-body" class="divide-y divide-gray-100"></tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Dynamic Modal -->
    <div id="crud-modal" class="fixed inset-0 bg-black bg-opacity-60 hidden items-center justify-center z-50 p-4">
        <div class="bg-white p-8 rounded-lg w-full max-w-2xl shadow-2xl max-h-[90vh] overflow-y-auto relative">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-gray-400 hover:text-red-500 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
            <h3 id="modal-title" class="text-xl font-bold mb-6 pr-8">Add Item</h3>
            <form id="crud-form" onsubmit="saveData(event)">
                <input type="hidden" id="item-type">
                <input type="hidden" id="item-id">
                
                <div id="form-fields" class="space-y-4">
                    <!-- Fields will be injected by JS depending on type -->
                </div>
                
                <div class="mt-8 flex justify-end gap-3">
                    <button type="button" onclick="closeModal()" class="px-5 py-2.5 border rounded text-gray-700 hover:bg-gray-100 font-medium">Cancel</button>
                    <button type="submit" class="px-5 py-2.5 bg-blue-600 text-white rounded hover:bg-blue-700 font-medium">Save Data</button>
                </div>
            </form>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
